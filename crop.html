
<!DOCTYPE html>
<html>
<head>
  <title>Crop Image</title>
</head>
<body>
  <h1>Image Cropper</h1>
  <p>Please select the Verddelle logo to crop it automatically</p>
  <input type="file" id="upload" accept="image/png" />
  <br><br>
  <canvas id="canvas" style="border: 1px solid #ccc; max-width: 100%;"></canvas>
  <br><br>
  <a id="download" style="display:none; padding: 10px; background: #c9a84c; color: white; text-decoration: none; border-radius: 5px;">Download Cropped Logo</a>

  <script>
    document.getElementById('upload').addEventListener('change', function(e) {
      const file = e.target.files[0];
      if (!file) return;
      
      const reader = new FileReader();
      reader.onload = function(event) {
        const img = new Image();
        img.onload = function() {
          const canvas = document.createElement('canvas');
          const ctx = canvas.getContext('2d');
          canvas.width = img.width;
          canvas.height = img.height;
          ctx.drawImage(img, 0, 0);
          
          const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
          const data = imageData.data;
          
          let minX = canvas.width, minY = canvas.height, maxX = 0, maxY = 0;
          let hasPixels = false;
          
          for (let y = 0; y < canvas.height; y++) {
            for (let x = 0; x < canvas.width; x++) {
              const alpha = data[(y * canvas.width + x) * 4 + 3];
              if (alpha > 10) { // Not fully transparent
                hasPixels = true;
                if (x < minX) minX = x;
                if (x > maxX) maxX = x;
                if (y < minY) minY = y;
                if (y > maxY) maxY = y;
              }
            }
          }
          
          if (!hasPixels) {
            alert('Image is fully transparent!');
            return;
          }
          
          const cropWidth = maxX - minX + 1;
          const cropHeight = maxY - minY + 1;
          
          const cropCanvas = document.getElementById('canvas');
          cropCanvas.width = cropWidth;
          cropCanvas.height = cropHeight;
          const cropCtx = cropCanvas.getContext('2d');
          
          cropCtx.drawImage(
            img, 
            minX, minY, cropWidth, cropHeight, 
            0, 0, cropWidth, cropHeight
          );
          
          const download = document.getElementById('download');
          download.href = cropCanvas.toDataURL('image/png');
          download.download = 'Verdelle_By_EZMA_cropped.png';
          download.style.display = 'inline-block';
          download.textContent = 'Download Cropped Logo (' + cropWidth + 'x' + cropHeight + ')';
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });
  </script>
</body>
</html>
